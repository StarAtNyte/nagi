name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-linux:
    name: Build Linux .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libx11-dev libxcb1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb
        run: cargo deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nagi-linux-deb
          path: target/debian/*.deb

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb

  build-windows:
    name: Build Windows .msi
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download libmpv.dll
        shell: pwsh
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/mpv-player/mpv/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "*x86_64*" -and $_.name -like "*.7z" } | Select-Object -First 1
          if (-not $asset) {
            # Fallback: use shinchiro's mpv builds
            $release = Invoke-RestMethod "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
            $asset = $release.assets | Where-Object { $_.name -like "*x86_64*" -and $_.name -notlike "*debug*" } | Select-Object -First 1
          }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv.7z
          7z e mpv.7z "libmpv*.dll" -r -y
          $dll = Get-ChildItem -Name "libmpv*.dll" | Select-Object -First 1
          Copy-Item $dll wix\libmpv.dll
          echo "Found: $dll"

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Install WiX v4
        run: dotnet tool install --global wix

      - name: Build .msi
        run: |
          Copy-Item target\x86_64-pc-windows-msvc\release\nagi.exe target\release\nagi.exe -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path target\release
          Copy-Item target\x86_64-pc-windows-msvc\release\nagi.exe target\release\nagi.exe
          wix build wix\main.wxs -o target\nagi-0.1.0-x64.msi

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: nagi-windows-msi
          path: target/*.msi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.msi
